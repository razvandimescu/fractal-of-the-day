name: daily

on:
  schedule:
    - cron: "7 0 * * *"          # 00:07 UTC daily — the day's seed is the date
  workflow_dispatch:             # manual "Run workflow" button
  push:
    branches: [main]
    paths:                       # rebuild when the engine or page changes
      - "daily.py"
      - "extras.py"
      - "build_site.py"
      - "docs/index.html"
      - ".github/workflows/daily.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build today's site
        run: python build_site.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
