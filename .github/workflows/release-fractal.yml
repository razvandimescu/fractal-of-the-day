name: Release Fractal

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  fractal:
    uses: ./.github/workflows/release-fractal.reusable.yml
    # Opt into tier-1 LLM classification (off by default — ~2.5 GB model, Actions cache
    # evicts after 7 days idle, so infrequent releasers re-pay it). To enable:
